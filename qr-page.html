  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--accent); }
    .qr-card { background:var(--surface); border-radius:18px; padding:2.5rem; box-shadow:var(--shadow-soft); width:min(680px,96%); text-align:center; }
    .qr-actions { display:flex; gap:1rem; justify-content:center; margin-top:1.25rem; }
    #socials svg { width:44px; height:44px; color:var(--navy); transition:transform .18s ease, color .18s ease; }
    #socials a:hover svg { transform:translateY(-4px); color:var(--blue); }
  </style>

    (function(c,l,a,r,i,t,y){

<body>
  <div class="qr-card">
    <div id="template">
      <div style="display:block; width:100%; text-align:center;">
        <img src="assets/images/logo.svg" alt="logo" style="width:85%; max-width:420px; height:auto; display:inline-block;">
      </div>

      <h2 id="name">Dr. Shrinidhi S. Kulkarni</h2>
      <p id="cred" style="font-weight:600; color:var(--muted);">BHMS | STSH - CCRH</p>

      <div id="timings" style="margin-top:1rem; text-align:left; color:var(--muted);">
        <strong>Timings</strong>
        <p style="margin:.25rem 0;">Mon - Fri: 08:00 - 12:00</p>
        <p style="margin:.25rem 0;">Mon - Fri: 16:00 - 21:00</p>
        <p style="margin:.25rem 0;">Sat: 08:00 - 13:00</p>
      </div>

      <div id="socials" style="margin-top:1rem; display:flex; gap:1rem; justify-content:center;">
        <a id="instagram" href="https://instagram.com/completecarehomoeo" target="_blank" rel="noreferrer noopener" aria-label="Instagram">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/></svg>
        </a>
        <a id="linkedin" href="https://linkedin.com/in/drshrinidhiskulkarni" target="_blank" rel="noreferrer noopener" aria-label="LinkedIn">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M8 11.5V17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="8.25" r="0.75" fill="currentColor"/><path d="M12.5 11.5V17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M12.5 11.5C14.2 11.5 15.5 12.1 15.5 13.6V17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </a>
      </div>

      <div id="contact-info" style="margin-top:1rem; text-align:left; color:var(--muted);">
        <p id="location"><strong>Location:</strong> Nagasandra, Bangalore</p>
        <p id="phone"><strong>Phone:</strong> <a href="tel:+918310612104" onclick="trackEvent('phone_call');">+91 83106 12104</a></p>
        <p id="website"><strong>Website:</strong> <a href="/">completecarehomoeo.com</a></p>
      </div>
      
    </div>
    <div class="qr-actions">
      <a class="btn btn-outline" href="index.html">Home</a>
      <a class="btn btn-primary" href="contact.html" onclick="trackEvent('appointment_click');">Book Appointment</a>
    </div>
  </div>

  <script>
    // Prevent access when navigated from the same origin (keep page QR-hidden one-way)
    try {
      var ref = document.referrer || '';
      if (ref.indexOf(window.location.origin) === 0) {
        // Came from same site — redirect to home
        window.location.href = 'index.html';
      }
    } catch (e){}

    // If QR encodes a `data` query param, try to parse JSON and override template fields
    (function(){
      var params = new URLSearchParams(window.location.search);
      if (!params.has('data')) return;
      var raw = params.get('data');
      try {
        var decoded = decodeURIComponent(raw);
      } catch(e){ decoded = raw; }

      // Try JSON first
      try {
        var obj = JSON.parse(decoded);

        if (obj.name) document.getElementById('name').innerText = obj.name;
        if (obj.credentials) document.getElementById('cred').innerText = obj.credentials;

        if (obj.timings && Array.isArray(obj.timings)) {
          var t = document.getElementById('timings');
          t.innerHTML = '<strong>Timings</strong>' + obj.timings.map(function(x){return '<p style="margin:.25rem 0;">'+x+'</p>'}).join('');
        }

        if (obj.instagram) document.getElementById('instagram').href = obj.instagram;
        if (obj.linkedin) document.getElementById('linkedin').href = obj.linkedin;
        if (obj.location) document.getElementById('location').innerHTML = '<strong>Location:</strong> '+obj.location;
        if (obj.phone) document.getElementById('phone').innerHTML = '<strong>Phone:</strong> <a href="tel:'+obj.phone+'" onclick="trackEvent(\'phone_call\');">'+obj.phone+'</a>';
        if (obj.website) document.getElementById('website').innerHTML = '<strong>Website:</strong> <a href="'+obj.website+'">'+obj.website.replace(/^https?:\/\//,'')+'</a>';

      } catch(e) {
        // Not JSON — ignore or handle as plain text silently
      }
    })();
  </script>
  <script src="assets/js/main.js"></script>
</body>
</html>
